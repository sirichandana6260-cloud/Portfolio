<!DOCTYPE html>
<html>

<head>
    <title>My Restaurant</title>
    <link rel="stylesheet" href="resstyle.css">
</head>

<body>

    <div id="header" style="height:200px; text-align:center;">
        <h1><br><br>Paradise Restaurant</h1>
        <p>Enjoy the meals</p>
    </div>

    <div class="overlay"></div>

    <div class="section">
        <h2 style="text-align:center;"><u>Menu</u></h2>
    </div>


    <!-- Item 1 -->
    <div class="content section">

        <div class="left">
            <img src="chicken.jpg" alt="Chicken biryani" style="width:80px;height:80px;">
        </div>

        <div class="left">
            <p style="text-align:center;">
                Chicken biryani is a delicious south Indian dish
            </p>
        </div>

        <div class="right box">
            <p style="text-align:right;">&#8377;180</p>
        </div>

        <div style="clear:both;"></div>

    </div>


    <!-- Item 2 -->
    <div class="content section">

        <div class="left">
            <img src="mutton.jpg" alt="Mutton biryani" style="width:80px;height:80px;">
        </div>

        <div class="left">
            <p style="text-align:center;">
                Mutton biryani is a delicious dish
            </p>
        </div>

        <div class="right box">
            <p style="text-align:right;">&#8377;240</p>
        </div>

        <div style="clear:both;"></div>

    </div>


    <!-- Item 3 -->
    <div class="content section">

        <div class="left">
            <img src="prawns.jpg" alt="Prawns biryani" style="width:80px;height:80px;">
        </div>

        <div class="left">
            <p style="text-align:center;">
                Prawns biryani is a delicious seafood dish
            </p>
        </div>

        <div class="right box">
            <p style="text-align:right;">&#8377;280</p>
        </div>

        <div style="clear:both;"></div>

    </div>

</body>
</html>
